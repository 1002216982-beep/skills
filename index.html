  {arena:"ישיבות צוות",skill:"9. אוריינות לשונית",low:"חיפוש ממושך אחר קבצים ישנים בתיבות דואר אלקטרוני, המוביל לעבודה כפולה ומיותרת.",mid:"שימוש בתיקיות שיתופיות קיימות לצורך שליפת מידע, תחת הכוונה של מנהל המידע בצוות.",high:"עדכון שוטף ומשותף בטבלה דינמית אחת, המייתרת את הצורך בחילופי הודעות מרובים ובחיפושי מידע."},
  {arena:"ישיבות צוות",skill:"10. אוריינות גלובלית",low:"היצמדות לשיטות עבודה ישנות ומוכרות מתוך חשש משינוי או מחוסר היכרות עם חלופות.",mid:"חשיפה למודל עבודה חדשני ממקום אחר בעקבות יוזמה של מוביל הצוות, ללא יישום בפועל.",high:"ייבוא והתאמה של כלי ניהול או למידה מתקדמים מהעולם, וביצוע ניסוי מבוקר לבחינת התאמתם לשטח."},
  {arena:"מרחבי למידה פיזיים",skill:"1. הכוונה עצמית",low:"תחושת מחנק בכיתה שמובילה ליציאה \"להסתובב\" במסדרונות ללא מטרה, או השחתה של רהיטים מתוך שעמום.",mid:"יציאה למרחב הלמידה החיצוני רק בזמנים שהוגדרו במערכת, תחת פיקוח צמוד למניעת הפרעות.",high:"בחירה יזומה בפינה שקטה במסדרון לצורך עבודה אישית, תוך הוכחה שהמרחב מאפשר ריכוז ולא רק \"בריחה\" מהכיתה."},
  {arena:"מרחבי למידה פיזיים",skill:"2. התנהלות חברתית",low:"יצירת \"טריטוריות\" סגורות במסדרון שמובילות לוויכוחים על מקום ישיבה ולתחושת הדרה של תלמידים אחרים.",mid:"ישיבה בקבוצות לפי חלוקה מראש של המורה, כדי למנוע חיכוכים על הציוד והמרחב.",high:"ארגון מחדש של הרהיטים במרחב המשותף כדי לאפשר לקבוצה נוספת להצטרף, מתוך הבנה שהמרחב שייך לכולם."},
  {arena:"מרחבי למידה פיזיים",skill:"3. חשיבה יצירתית",low:"כתיבת גרפיטי או חריטה על שולחנות כדרך יחידה להשאיר \"חותם אישי\" בתוך מרחב מנוכר וקר.",mid:"תליית תוצרים על הקיר רק בתוך מסגרות קבועות מראש ועל פי הוראות עיצוב של צוות המורים.",high:"הפיכת קיר ריק במסדרון ל\"לוח השראה\" קבוצתי שבו משאירים שאלות חקר או רעיונות לשיפור בית הספר עבור אחרים."},
  {arena:"מרחבי למידה פיזיים",skill:"4. מודעות עצמית",low:"חוסר שקט גופני שמוביל לטריקת דלתות או פגיעה בציוד, מבלי להבין שהמרחב הנוכחי פשוט לא מתאים למצב הרגשי.",mid:"שימוש ב\"מרחב פתוח\" להתרעננות רק לאחר קבלת אישור מיוחד ובזמן קצוב מאוד.",high:"זיהוי הצורך בשינוי אווירה ומעבר עצמאי לעמדת עבודה גבוהה או פינה מבודדת כדי להירגע ולחזור למיקוד."},
  {arena:"מרחבי למידה פיזיים",skill:"5. אוריינות מידע",low:"התייחסות לקירות ביה\"ס כאל \"רעש\" לבן שלא רלוונטי לחיים, מה שמוביל לקריעת פוסטרים או מודעות.",mid:"קריאת עדכונים מהקיר רק כשיש הנחיה ישירה לבדוק את לוח המבחנים או את הודעות ההנהלה.",high:"סריקת קוד QR על הקיר כדי לקבל מידע על יוזמות חברתיות או עדכוני פרויקטים, והוספת מידע אישי לטובת הכלל."},
  {arena:"מרחבי למידה פיזיים",skill:"6. חשיבה ביקורתית",low:"תלונות על כך ש\"המקום הזה מגעיל/לא נוח\" מבלי להציע פתרון, מה שמגביר את תחושת הניכור והתסכול.",mid:"השתתפות בסקר בית ספרי על \"איך נשפר את החצר\", ללא מעורבות בביצוע השינויים בפועל.",high:"זיהוי פינה \"מתה\" במסדרון והצעת מודל לסידור מחדש שלה (תאורה, ישיבה) כדי שתהפוך למרחב למידה פעיל."},
  {arena:"מרחבי למידה פיזיים",skill:"7. מודעות חברתית",low:"הפרעה מכוונת (רעש, חסימת מעבר) לאחרים שמשתמשים במרחב, מתוך חוסר כבוד לצרכים של הזולת.",mid:"שמירה על השקט במרחבים המשותפים רק בגלל נוכחות של מורה תורן או \"משגיח\" במסדרון.",high:"הנמכת עוצמת הקול באופן אוטומטי כשעוברים ליד עמדות עבודה אישיות, מתוך הבנה וכיבוד המאמץ של האחר."},
  {arena:"מרחבי למידה פיזיים",skill:"8. אוריינות לשונית",low:"השארת מסרים אלימים או פוגעניים על גבי הציוד כדרך ביטוי יחידה בתוך המרחב המוסדי.",mid:"כתיבת תגובות על לוחות שיתופיים רק תחת פיקוח והנחיה של המורה לגבי תוכן המסר.",high:"שימוש בלוחות המרחב כדי לכתוב הודעות תמיכה או הצעות לייעול, תוך שימוש בשפה שמחברת ולא מפלגת."},
  {arena:"מרחבי למידה פיזיים",skill:"9. אוריינות דיגיטלית",low:"פגיעה בתשתיות טכנולוגיות (נקודות טעינה, מסכים) מתוך תסכול שהן \"לא עובדות\" או לא נגישות.",mid:"שימוש בציוד הטכנולוגי במרחב רק בזמנים מוגדרים מראש ותחת הרשאות מוגבלות מאוד.",high:"שימוש בלוח דיגיטלי במרחב להצגת התקדמות של פרויקט צוותי, תוך שמירה על הציוד כמשאב יקר ומשותף."},
  {arena:"מרחבי למידה פיזיים",skill:"10. אוריינות גלובלית",low:"השלכת פסולת במרחב מתוך מחשבה ש\"יש מנקה שיעשה את זה\", מה שמעמיק את הניכור לסביבה.",mid:"השתתפות ביום \"ניקיון וטיפוח\" מאורגן, שבו כולם מנקים את החצר ביחד כחובה.",high:"לקיחת אחריות יומיומית על סידור המרחב המשותף בסיום השימוש, מתוך הבנה שזהו הבית השני של כולם."},
  {arena:"שפה בית ספרית",skill:"1. מודעות עצמית",low:"שימוש בתוויות סופיות כמו \"אני גרוע במתמטיקה\" או \"הוא תלמיד בעייתי\", שחוסמות כל אפשרות לשינוי.",mid:"שימוש במונחים כמו \"יש לי קושי בוויסות\" רק כי היועצת אמרה, ללא הבנה עמוקה של החוויה האישית.",high:"החלפת ה\"אני לא יכול\" ב\"אני עדיין לא מצליח את זה\", וזיהוי הכוח של \"עוד לא\" כחלק מתהליך הלמידה."},
  {arena:"שפה בית ספרית",skill:"2. התנהלות חברתית",low:"שפה אלימה, צינית או מקטינה (\"יאללה יאללה\", \"מי שאל אותך\") שהופכת לנורמה של הישרדות חברתית.",mid:"הקפדה על \"דיבור מכבד\" רק בנוכחות מבוגר או בזמן שיעור חינוך, כסוג של ציות לחוקי בית הספר.",high:"ניסוח משוב לעמית בצורה בונה: \"הבנתי את הנקודה שלך, אבל אולי כדאי שננסה להסתכל על זה גם מהזווית של...\""},
  {arena:"שפה בית ספרית",skill:"3. חשיבה ביקורתית",low:"קבלת ציונים כ\"גזר דין\" על האינטליגנציה, מבלי לשאול שאלות על תהליך הלמידה או על איכות המשימה.",mid:"שימוש בביטויים כמו \"חשיבה מחוץ לקופסה\" כסיסמה ריקה, ללא יכולת לבקר באמת תוכן או עמדה.",high:"שאילת שאלות כמו: \"איזה נתון חסר לנו כדי להחליט?\" או \"למה המקור הזה טוען דווקא כך?\", כחלק טבעי מהשיח."},
  {arena:"שפה בית ספרית",skill:"4. אוריינות לשונית",low:"דיבור במשלב נמוך מאוד או בשפת רחוב גם בסיטואציות רשמיות, כדרך להראות \"מרד\" או חוסר שייכות למערכת.",mid:"מעבר לשפה רשמית ומאולצת רק בזמן כתיבת עבודות או פנייה למנהלת, מתוך תחושת זרות.",high:"יכולת \"להחליף קוד\": התאמת השפה והטון לסיטואציה (דיון בכיתה לעומת הפסקה) מתוך הבנת הכוח של המילה."},
  {arena:"שפה בית ספרית",skill:"5. מודעות חברתית",low:"שימוש בכינויי גנאי או הכללות על קבוצות (\"החננות\", \"הערסים\") שמחזקים את הניכור והקיטוב בבית הספר.",mid:"השתתפות בשיח על \"קבלת האחר\" בטקסים, מבלי לשנות את אוצר המילים היומיומי בהפסקות.",high:"תיקון עצמי ועצירת חברים כשהם משתמשים בשפה מדירה, והחלפתה בשפה שרואה את האדם שמאחורי התווית."},
  {arena:"שפה בית ספרית",skill:"6. הכוונה עצמית",low:"המתנה להוראות מפורטות (\"מה בדיוק לכתוב?\") וחוסר יכולת להגדיר יעדים אישיים בשפה פשוטה.",mid:"שימוש במושגים של \"ניהול זמן\" כי זה מופיע ביומן, מבלי לתרגם אותם לפעולות קונקרטיות בשטח.",high:"ניסוח עצמאי של מטרת הלמידה: \"היעד שלי היום הוא להבין איך לפתור משוואות עם נעלם אחד\", במקום \"לסיים את הדף\"."},
  {arena:"שפה בית ספרית",skill:"7. חשיבה יצירתית",low:"פסילת רעיונות חדשים במילים כמו \"זה בחיים לא יעבוד פה\" או \"חבל על הזמן\", שחונקות כל יוזמה.",mid:"הסכמה לנסות משהו חדש רק אם הוא מוגדר כ\"פרויקט מיוחד\" עם הנחיות ברורות מההנהלה.",high:"שימוש בשפה מאפשרת: \"מה אם ננסה לעשות את זה אחרת?\" או \"בואו נבדוק איך אפשר לשפר את הרעיון הזה\"."},
  {arena:"שפה בית ספרית",skill:"8. אוריינות דיגיטלית",low:"שימוש בשפה פוגענית ברשתות החברתיות (\"טוקבקים\" פנימיים) מתוך תחושה שזה \"לא נחשב\" כשפה בית ספרית.",mid:"הקפדה על \"נתיבות רשת\" (Netiquette) רק בקבוצות הווטסאפ הרשמיות של הכיתה תחת פיקוח המורה.",high:"יצירת שפה דיגיטלית מכבדת ומקדמת גם במרחבים הלא-פורמליים, מתוך הבנה שהמילה הכתובה היא ייצוג של הכותב."},
  {arena:"שפה בית ספרית",skill:"9. אוריינות גלובלית",low:"תפיסת בית הספר כבועה מבודדת, ללא שימוש בשפה שמקשרת את הנלמד למה שקורה בעולם האמיתי.",mid:"אזכור אירועים אקטואליים רק בשיעורי אזרחות או היסטוריה, כחלק מחומר הלימוד המחייב.",high:"שימוש במושגים מהעולם (כמו \"קיימות\" או \"זכויות אדם\") כדי לתאר אירועים שקורים כאן ועכשיו בתוך חצר בית הספר."},
  {arena:"שפה בית ספרית",skill:"10. אוריינות מידע",low:"שיתוף שמועות או חצאי אמיתות בשיח המסדרון ללא צורך בדיוק לשוני או בבדיקת עובדות.",mid:"בקשת מקורות למידע רק כחלק ממטלה אקדמית שבה נדרש \"ציון מקורות\" פורמלי.",high:"דיוק במסירת מידע ועמידה על ההבדל בין \"דעה\" ל\"עובדה\" בתוך שיחות יומיומיות עם חברים ומורים."},
  {arena:"שותפויות קהילתיות",skill:"1. מודעות חברתית",low:"יציאה ל\"התנדבות\" רק כדי לסמן וי על שעות מחויבות אישית, תוך זלזול או חוסר עניין באוכלוסייה (למשל: בבית קשיש).",mid:"השתתפות בפרויקט קהילתי מובנה שבו המורה קבע בדיוק מה עושים ועם מי מדברים.",high:"זיהוי צורך אמיתי בשכונה (למשל: גינה מוזנחת) וייזום מפגש עם דמויות מפתח בקהילה לפתרון משותף."},
  {arena:"שותפויות קהילתיות",skill:"2. התנהלות חברתית",low:"ייצוג שלילי של בית הספר בחוץ (צעקות, לכלוך, חוסר כבוד) מתוך תחושה ש\"אף אחד לא רואה אותי כאן\".",mid:"עמידה בכללי התנהגות ייצוגיים בזמן סיור לימודי בעירייה רק בגלל נוכחות המנהלת.",high:"ניהול שיח בוגר ומכבד מול בעלי עסקים או תושבים, תוך הבנה שהתנהלות התלמיד משפיעה על תדמיתו ועל הקהילה."},
  {arena:"שותפויות קהילתיות",skill:"3. חשיבה ביקורתית",low:"קבלת המצב החברתי בעיר כ\"ככה זה\" (עוני, לכלוך) מבלי לשאול מי אחראי או איך אפשר לשנות.",mid:"ניתוח הצרכים של הקהילה מתוך דף עבודה מוכן שחולק בכיתה לאחר סיור בשכונה.",high:"שאילת שאלות על חלוקת משאבים בקהילה והצעת פתרון המבוסס על נתונים (למשל: \"חסרים כאן מרחבי נוער כי...\")"},
  {arena:"שותפויות קהילתיות",skill:"4. אוריינות לשונית",low:"שימוש בשפה לא מותאמת (סלנג קיצוני או דיבור תוקפני) מול גורמים בקהילה (הורים, עובדי עירייה, קשישים).",mid:"כתיבת מכתב רשמי לגורם בקהילה רק לאחר שהמורה עבר על כל מילה ותיקן את המשלב.",high:"התאמה עצמאית של השפה והטון לפי קהל היעד – מצגת עסקית למשקיעים לעומת פעילות חווייתית לילדי גן."},
  {arena:"שותפויות קהילתיות",skill:"5. מודעות עצמית",low:"תחושת חוסר ביטחון או התנשאות בעת מפגש עם \"האחר\" בקהילה, שמובילה להסתגרות או להערות פוגעניות.",mid:"ביצוע רפלקציה מונחת על \"איך הרגשתי במפגש עם הקהילה\" כחלק משיעור חינוך.",high:"זיהוי דעות קדומות אישיות תוך כדי המפגש ובחירה מודעת לפעול בגובה העיניים מתוך סקרנות ואמפתיה."},
  {arena:"שותפויות קהילתיות",skill:"6. הכוונה עצמית",low:"המתנה שמישהו \"מהקהילה\" יבוא ויפעיל אותם, וחוסר אונים כשאין הנחיה צמודה מהמורה בשטח.",mid:"ביצוע משימות בתוך הפרויקט הקהילתי רק כשיש לו\"ז קשיח ותזכורות חוזרות ונשנות.",high:"ניהול עצמאי של לוחות זמנים מול גורמי חוץ (קביעת פגישה, מעקב משימות) ללא צורך בתיווך המורה."},
  {arena:"שותפויות קהילתיות",skill:"7. חשיבה יצירתית",low:"חזרה על דפוסי תרומה ישנים (איסוף מזון) מבלי לחשוב אם זה מה שהקהילה באמת צריכה כרגע.",mid:"השתתפות בסיעור מוחות כיתתי לשיפור חיי הקהילה תחת הנחיית מנחה חיצוני.",high:"פיתוח פתרון חדשני המנצל את משאבי ביה\"ס לטובת הקהילה (למשל: קורס אוריינות דיגיטלית שהתלמידים מעבירים)."},

  {arena:"שותפויות קהילתיות",skill:"10. אוריינות מידע",low:"שיתוף מידע לא מדויק או \"פייק ניוז\" על אירועים בקהילה שמעורר בהלה או כעס מיותר.",mid:"שימוש בנתונים שסיפקה העירייה לצורך הצגת פרויקט, ללא בדיקה עצמאית של המקורות.",high:"איסוף נתונים מהשטח (סקרים, ראיונות), ניתוחם והצגת תמונת מצב אמינה לתושבים ולמקבלי ההחלטות."},
  {arena:"מועצת תלמידים",skill:"1. הכוונה עצמית",low:"ישיבות שמוקדשות רק להעלאת תלונות (\"למה אין סבון בשירותים?\") ללא הצעה לפתרון או מעקב.",mid:"עמידה בסדר יום (אג'נדה) שהמורה המלווה קבעה, וביצוע משימות קטנות שתחת פיקוחה.",high:"קביעת יעדים רבעוניים (למשל: \"הפחתת ונדליזם בשירותים\"), בניית תוכנית עבודה עצמאית ומעקב אחר התקדמות."},

=== מיומנויות דמות הבוגר 2030 — המדיניות הפדגוגית הלאומית ===

מקור רשמי: משרד החינוך הישראלי, מסמך "תפיסת הלמידה המתחדשת — מיומנויות, יכולות ליבה ואבני הדרך" (תשפ"א-תשצ"א, 2021-2031).
הובלה: ד"ר מיכל טביביאן מזרחי (סמנכ"לית אסטרטגיה ותכנון), ד"ר מירי שליסל (יו"ר המזכירות הפדגוגית).
ליווי אקדמי: האוניברסיטה העברית, אוניברסיטת תל אביב, בר אילן, הטכניון, מכון ויצמן, המרכז הבינתחומי הרצליה.

הגדרת מיומנות (הגדרה רשמית): יכולת כללית הנרכשת בלימוד ובאימון אשר תומכת בחשיבה, בלמידה ובהתפתחות ומנחה אותן. מיומנות כללית מפותחת תמיד בזיקה לידע, אך פיתוחה לא תלוי בסוג ידע מסוים. מיומנות ניתנת להעברה בין תחומי דעת ומאפשרת לעשות שימוש יעיל והולם בידע, בניסיון ובערכים במגוון רחב של הקשרים.

מבנה המסמך: לכל מיומנות — הגדרה, 3-6 יכולות ליבה, ואבני דרך ל-5 טווחי גיל: גיל רך (3-6), יסודי א'-ב' (6-8), יסודי ג'-ו' (8-12), חט"ב (12-15), חט"ע (15-18).

13 המיומנויות מחולקות ל-4 קבוצות:
• קוגניטיביות: אוריינות לשונית, אוריינות מתמטית, אוריינות מדעית, חשיבה ביקורתית, חשיבה יצירתית, אוריינות דיגיטלית, אוריינות מידע
• רגשיות: מודעות עצמית, הכוונה עצמית
• חברתיות: מודעות חברתית, התנהלות חברתית, אוריינות גלובלית
• גופניות: אוריינות גופנית-בריאותית

מטרת המסמך: לסייע בהכוונת כלל הגורמים במערכת החינוך — גורמי מטה, מנהלים, עובדי הוראה, מדריכים ומפקחים — מתוך שימוש בשפה אחידה ומשותפת.

--- 1. אוריינות לשונית ---
הגדרה: היכולת להשתמש בשפה דבורה וכתובה למגוון מטרות חברתיות, לימודיות ואישיות. כוללת הבנת טקסטים, ביטוי מחשבות ורגשות, ניסוח רעיונות והגנה עליהם, הצגת מידע בצורה בהירה ותקשורת איכותית בהתאמה לקהל ולנסיבות.
יכולות ליבה:
1. איתור מידע, פרשנות והיסק ממקור בודד
2. איתור מידע, פרשנות והיסק ממקורות מרובים
3. הערכה ביקורתית של טקסטים
4. הבעה בעל פה — השתתפות בשיחה, הצגת עמדות מול קהל
5. הבעה בכתב — הפקת טקסט רלוונטי, אינפורמטיבי ולכיד

--- 2. אוריינות מתמטית ---
הגדרה: היכולת לייצג מצבים ותופעות בשפה מתמטית וליישם ידע, מיומנויות ואסטרטגיות חשיבה מתמטיים למגוון צרכים בהקשרים לימודיים וחוץ לימודיים.
יכולות ליבה:
1. אוריינות כמותית (Quantity) — הבנת מספרים, כמויות, חישוב ואומדן
2. ייצוג מופשט (Symbolic Representation) — יחסים מופשטים, שיטות ייצוג מגוונות
3. חשיבה גיאומטרית (Shape and Space) — תכונות צורות, טרנספורמציות, התמצאות במרחב
4. אוריינות נתונים (Data and Uncertainty) — איסוף, פרשנות נתונים, הסקת מסקנות, הסתברות

--- 3. אוריינות מדעית ---
הגדרה: היכולת לעשות שימוש בידע ומושגים מדעיים לתיאור תופעות, זיהוי שאלות לחקירה, הסקת מסקנות מבוססות ראיות ושימוש בנתונים אובייקטיביים. מובילה לגיבוש זהות מדעית ואקטיביות לצדק חברתי וסביבתי.
יכולות ליבה:
1. התמצאות מדעית (Nature of Science) — הבחנה בין שאלות מדעיות ולא-מדעיות, הכרת מאפייני חקר מדעי
2. הסבר מדעי של תופעות — שימוש בידע מדעי לתיאור והסבר, הערכת טיעון מדעי
3. תכנון, ביצוע והערכת מחקר (Procedural Knowledge) — ניסוח שאלות מחקר, השערות, תכנון מערך
4. פרשנות מדעית של נתונים וראיות — ניתוח תוצאות, הפקת ייצוגים, הסקת מסקנות

--- 4. חשיבה ביקורתית ---
הגדרה: היכולת לבחון ולהעריך מידע, דעות או רעיונות באופן מושכל, לגבש דעה עצמאית, לבחור בין חלופות ולקבל החלטות מנומקות.
יכולות ליבה:
1. הערכת מידע ומקורות — הגדרת קריטריונים לבחינת מהימנות, הבחנה בין עובדות ודעות, זיהוי מניפולציות
2. טיעון (Argumentation) — ניסוח טענה, זיהוי הבדל בין נימוקים, זיהוי כשלים לוגיים
3. קבלת החלטות — ניתוח בעיה ממגוון נקודות מבט, השוואת פתרונות אפשריים
4. הטלת ספק — חשיבה עצמאית אל מול סמכות, שאלות מערערות, השהיית שיפוט

--- 5. חשיבה יצירתית ---
הגדרה: היכולת לחשוב על נושאים מוכרים בדרכים חדשות, להציע פתרונות חלופיים, לייצר הקשרים חדשים ולהפיק תוצרים מקוריים, רלוונטיים ובעלי ערך.
יכולות ליבה:
1. סקרנות ומקוריות — פתיחות לרעיונות חדשים, שאלות לכיוונים לא צפויים
2. גמישות מחשבתית — בחינה ממגוון נקודות מבט, פתרונות במקומות לא שגרתיים
3. תעוזה והתמדה — הגנה על רעיונות, התמודדות עם עמימות, למידה מכישלונות
4. יצירת הקשרים חדשים — זיהוי חיבורים חדשים, שימוש בידע קיים בהקשרים חדשים
5. יישום — תרגום מסקנות לפעולות קונקרטיות ותוצרים

--- 6. אוריינות דיגיטלית ---
הגדרה: היכולת להשתמש בטכנולוגיות מידע ותקשורת למגוון צרכים אישיים, קבוצתיים וחברתיים, באופן הולם, יעיל ואחראי, ולהסתגל לשינויים טכנולוגיים.
יכולות ליבה:
1. תפעול ופתרון בעיות — שימוש ברכיבי חומרה ותוכנות, למידה עצמאית ברשת
2. צריכה ויצירה של תוכן — הערכת איכות ואמינות מסרים, יצירת תוכן מולטימדיה
3. שיתופיות — תקשורת בינאישית וקבוצתית, ניהול קשרים ברשת, זהות דיגיטלית
4. אתיקה ומוגנות — התנהלות הגונה ומכבדת, שמירת זכויות יוצרים, מודעות לסכנות ברשת

--- 7. אוריינות מידע ---
הגדרה: היכולת להגדיר את המידע הנדרש, לאתרו, לארגנו, להעריכו ולהציגו בצורה מושכלת.
יכולות ליבה:
1. איתור מידע — הבנת המידע הנדרש, הכרת מנועי חיפוש, איתור יעיל
2. הערכת מידע — השוואת סוגי מקורות, הערכה ביקורתית, מיזוג מקורות
3. ארגון מידע — שיטות מגוונות לתיעוד, ארגון ומיון
4. שימוש במידע — בחינת השערות, הסקת מסקנות, שימוש חוקי והוגן
5. הצגת מידע — הצגה בהירה, שיטות הצגה מגוונות, התאמה למטרה ולקהל

--- 8. מודעות עצמית ---
הגדרה: הכרת הנטיות והמאפיינים של העצמי ומודעות לתהליכים פנימיים.
יכולות ליבה:
1. הכרת העצמי (Self-Knowledge) — מאפיינים אישיים, חוזקות וחולשות, הבנת ביטויים במצבים שונים
2. זיהוי רגשות (Emotion Identification) — הבחנה בין רגשות, קשר רגשות-מחשבות-התנהגות
3. מסוגלות עצמית — אמונה ביכולות, התמודדות עם כישלונות, growth mindset, Agency

--- 9. הכוונה עצמית ---
הגדרה: היכולת לניהול עצמי (self-regulation) הכוללת ויסות עצמי, הנעה עצמית וחוסן, המאפשרת התמודדות עם לחצים ומשברים.
יכולות ליבה:
1. ויסות עצמי (Self-Regulation) — עיצוב הסביבה, ויסות רגשות, הבעת רגשות מותאמת למצב
2. הנעה עצמית (Self-Motivation) — הצבת מטרות, תכנון, בקרה עצמית, ניהול זמן ותעדוף
3. התמודדות עם לחץ ומשבר (Coping) — זיהוי מצבי קושי, בקשת עזרה, גמישות והסתגלות

--- 10. מודעות חברתית ---
הגדרה: היכולת להבין מצבים חברתיים והתנהגות של אנשים אחרים מתוך פתיחות ורגישות כלפי אחרים דומים ושונים.
יכולות ליבה:
1. הבנת האחר (Understanding Others) — הכרת נקודת המבט, זיהוי מסרים מרומזים, הבנת ההשפעה ההדדית
2. זיהוי מצבים חברתיים — זיהוי נורמות חברתיות, תהליכי קבלת החלטות קבוצתיים
3. רגישות חברתית-תרבותית (Cultural Sensitivity) — מודעות לשונות ודמיון, הערכת פרספקטיבות מגוונות

--- 11. התנהלות חברתית ---
הגדרה: היכולת ליצור ולשמר מערכות יחסים חיוביות ומתגמלות במגוון הקשרים והיכולת לשתף פעולה.
יכולות ליבה:
1. ניהול קונפליקטים (Conflict Management) — שיח מכבד במצבי קונפליקט, מציאת פתרונות בשיתוף פעולה
2. עבודת צוות (Teamwork) — קבלה ושיתוף מידע, קבלת החלטות שיתופית
3. תקשורת וניהול יחסים בין אישיים (Diverse Social Relationships) — הקשבה פעילה, אמפתיה, יצירה ושמירת מערכות יחסים

--- 12. אוריינות גלובלית ---
הגדרה: היכולת להתמצא ולגלות אכפתיות כלפי סוגיות גלובליות; לגלות סקרנות, פתיחות ואמפתיה כלפי אנשים מתרבויות שונות ולשתף פעולה עימם.
יכולות ליבה:
1. מודעות גלובלית (Global Awareness) — הערכת השקפות עולם תרבותיות שונות, סקרנות ואמפתיה, ביקורת סטריאוטיפים
2. אחראיות גלובלית — הכרת סוגיות גלובליות (התחממות, עוני), אורח חיים מקיים, פעולה לשינוי
3. התנהלות רב-תרבותית — תקשורת חיובית ומכבדת, שיתוף פעולה, ניהול קונפליקטים תרבותיים

--- 13. אוריינות גופנית-בריאותית ---
הגדרה: היכולת להבין מידע בריאותי, להשתתף בפעילות גופנית עקבית ומותאמת וליישם אורח חיים בריא ומאוזן.
יכולות ליבה:
1. ידע ומודעות בנושאי בריאות — הכרת מידע בריאותי, קבלת החלטות מושכלות
2. תנועה ופעילות גופנית — שמירת כושר גופני, מיומנויות תנועה, השתתפות בפעילויות
3. אורח חיים בריא — הרגלי אכילה בריאה, שינה מספקת
4. שמירה על בטיחות — ידע על גורמים מסכנים, התמודדות עם מצבי סיכון
5. התנהגות מינית בריאה — מודעות לגוף, יחסי מין מותאמי גיל

=== מסגרת אבני הדרך — 5 טווחי גיל ===
כל מיומנות מוגדרת עם אבני דרך לפי טווחי גיל:

=== תפיסת הלמידה המתחדשת — הבסיס הפילוסופי (מסמך רשמי, תשפ"א-תשצ"א) ===

מקור: "תפיסת הלמידה", משרד החינוך הישראלי (2021-2031).
השראה: פרויקט OECD Education 2030 — תנועה מפדגוגיה מסורתית (Instructionalist) לתפיסת למידה עדכנית.

** שלושת רכיבי מטרות הלמידה **
תפיסת הלמידה מגדירה שלושה רכיבים שלובים זה בזה — ידע, מיומנויות וערכים:

1. ידע (להבין) — תשתית להבנה. ארבעה אשכולות:
   - לימודי יסוד בין-לאומיים: שפת אם, אנגלית, מתמטיקה, מדעים
   - לימודי זהות ושייכות: היסטוריה, ספרות, גאוגרפיה, אזרחות, תנ"ך/מורשת
   - לימודי אמנויות ותנועה
   - מקצועות בחירה והעמקה (בחירה אישית של התלמיד)
   שלושה סוגי ידע: תוכני (עובדות ורעיונות), מעשי (מיומנויות ייחודיות לתחום), אפיסטמי (כיצד נוצר הידע)

2. מיומנויות (לפעול) — 13 מיומנויות ב-4 קטגוריות (מפורטות לעיל)

3. ערכים (להתחייב) — השקפת עולם מוסרית ברוח חוק החינוך הממלכתי:
   - מחויבות למדינת ישראל כמדינה יהודית ודמוקרטית
   - כבוד האדם וזכויותיו
   - צדק חברתי ואזרחי
   - שמירה על הסביבה
   - מעורבות בחברה ועזרה לזולת

** עקרון "ידע פעיל" **
הידע שמשרד החינוך מבקש לפתח הוא "ידע פעיל" — דינמי, מקושר, מוצדק. 
אינו מידע סטטי אלא רשת מנטלית המקשרת בין יחידות בעלת משמעות ללומד.
שלושה מאפיינים: התפתחות (דינמי), קישוריות (בין תחומי דעת), הצדקה (תהליך אינטראקטיבי).

** למידה סביב "רעיונות גדולים" **
יעד למידה מרכזי של יחידת נושא — רלוונטי לעולם הלומד, מעורר עניין, בעל משמעות מעבר לפרטים. 
שלושה מימדי למידה: תחומית, בין-תחומית/רב-תחומית, על-תחומית.

** ההבדל: פדגוגיה מסורתית vs. תפיסה עדכנית **
מסורתית: מיקוד בתוכן → למידת עובדות → מורה מעביר → מבחני בגרות מסכמי תוכן
עדכנית: מיקוד בדרכי למידה → רעיונות גדולים → ליווי תלמידים → הערכת ידע+מיומנויות+ערכים (כולל הערכה עצמית ועמיתים)

** הקשר למשבר הקורונה **
משבר 2020 הוכיח: ללמידה עצמאית ושיתופית נדרשות מיומנויות רגשיות-חברתיות + אוריינות דיגיטלית + אוריינות מידע + חוסן נפשי. 
גם יצר הזדמנויות: תעדוף תכנים, שילוב בין-תחומי, הערכה איכותנית, חקר עצמאי, מרחבי בחירה.

** כלי מדיניות ליישום **
מדיניות ההוראה: יחידות הוראה, תוכניות למידה, גמישות פדגוגית, מאגר תוכניות לקידום מיומנויות
מדיניות ההערכה: כלי הערכה מותאמי מיומנויות, מחוונים למיומנויות רגשיות-חברתיות
מדיניות סביבות למידה: תקשוב כלל בתי הספר, מרחבי למידה בית-ספריים (M-21) וחוץ בית-ספריים
מדיניות עובדי ההוראה: צוותי מו"פ בית-ספריים

** מה נדרש להצלחת השינוי **
שותפויות חזקות בין כלל הגורמים: צוותי חינוך, הורים, תלמידים, מטה משרד החינוך, מחוזות, רשויות מקומיות ומנהלים.
גמישות ועצמאות לצוותי חינוך + התנסות ויוזמה שלהם = כלים ללומדים להשגת מטרות הלמידה.
`;

// Smart KB builder — sends only relevant entries (by arena/topic) or first 20 if none
function buildKB(topic="") {
  const relevant = topic
    ? KB.filter(k=>k.arena.includes(topic)||k.skill.includes(topic))
    : KB.slice(0,20);
  const rows = (relevant.length ? relevant : KB.slice(0,20));
  return rows.map(k=>`זירה:${k.arena}|מיומנות:${k.skill}\n🔴${k.low}\n🟡${k.mid}\n🟢${k.high}`).join("\n---\n");
}

async function callAI(system, user, history=[]) {
  const fullSystem = BASE_SYSTEM + "\n\n" + system;
  const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:fullSystem,messages:[...history,{role:"user",content:user}]})});
  return (await res.json()).content[0].text;
}

function Card({children,style={}}) {
  return <div style={{background:"white",border:"1px solid #bae6fd",borderRadius:12,padding:14,boxShadow:"0 1px 6px rgba(14,165,233,0.07)",...style}}>{children}</div>;
}
function Lbl({children}) {
  return <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.1em",color:"#0369a1",textTransform:"uppercase",marginBottom:9}}>{children}</div>;
}
function Dots() {
  return <div style={{display:"flex",gap:5,padding:"10px 14px"}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#0ea5e9",animation:`bounce 1s ${i*0.2}s infinite ease-in-out`}}/>)}</div>;
}
function Chip({label,onClick}) {
  const [h,setH]=useState(false);
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{background:h?"#0369a1":"white",color:h?"white":"#0369a1",border:"2px solid #bae6fd",borderRadius:999,padding:"6px 14px",fontSize:13,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s",fontFamily:"inherit"}}>{label}</button>;
}

function Chatbot() {
  const [msgs,setMsgs]=useState([]);
  const [typing,setTyping]=useState(false);
  const [flow,setFlow]=useState("sector");
  const [prof,setProf]=useState({sector:"",role:""});
  const [lastArena,setLastArena]=useState("");
  const [shownScenarios,setShownScenarios]=useState([]);
  const [hist,setHist]=useState([]);
  const [input,setInput]=useState("");
  const [page,setPage]=useState(0);
  const endRef=useRef(null);

  const PAGES=[];
  for(let i=0;i<ALL_ARENAS.length;i+=5) PAGES.push(ALL_ARENAS.slice(i,i+5));
  const aC=p=>[...PAGES[p%PAGES.length],"עוד זירות ›"];
  const ts=()=>new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
  const bot=(text,chips=null)=>setMsgs(p=>[...p,{from:"bot",text,chips,ts:ts()}]);
  const usr=text=>setMsgs(p=>[...p.map(m=>({...m,chips:null})),{from:"user",text,ts:ts()}]);

  useEffect(()=>{setTimeout(()=>bot("שלום וברוכים הבאים! 🌟\n\nאני מיומנובוט 2030 — כלי סיוע ובקרה בהטמעת מיומנויות דמות הבוגר.\n\nנוצרתי במיוחד כדי לחשוב יחד איתך — לא לתת תשובות מוכנות, אלא לעזור לך לבחון את המציאות הבית-ספרית שלך, לזהות הזדמנויות לצמיחה ולבנות יחד דרך פעולה אמיתית ומותאמת לך.\n\nנתחיל בהיכרות קצרה — זה ייקח רגע בלבד 😊\n\nמאיזה מגזר בית הספר שלך?",["ממלכתי","ממלכתי-דתי","חרדי","ממלכתי-ערבי","דרוזי/צ'רקסי"]),400);},[]);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"});},[msgs,typing]);

  function getHighScenarios(arena, alreadyShown=[]) {
    return KB.filter(k=>k.arena===arena&&k.high&&!alreadyShown.includes(k.skill)).slice(0,3);
  }

  function buildHighText(picks) {
    return picks.map((k,i)=>`${i+1}. ${k.skill?k.skill+" — ":""}רמה מיטבית 🟢\n${k.high}`).join("\n\n");
  }

  async function pick(val) {
    if(val==="עוד זירות ›"){const np=(page+1)%PAGES.length;setPage(np);setMsgs(p=>{const a=[...p];const l=a[a.length-1];if(l?.from==="bot")a[a.length-1]={...l,chips:aC(np)};return a;});return;}
    setMsgs(p=>p.map(m=>({...m,chips:null}))); usr(val);

    if(flow==="sector"){
      setProf(p=>({...p,sector:val}));
      setTimeout(()=>{bot("תודה! 😊\n\nואיזה תפקיד אתה ממלא/ת בבית הספר?",["מנהל/ת","רכז/ת מיומנויות","רכז/ת פדגוגי/ת"]);setFlow("role");},350);
    }
    else if(flow==="role"){
      setProf(p=>({...p,role:val}));
      setTimeout(()=>{bot("נהדר, שמח/ה להכיר! 🏫\n\nשאלה ראשונה — האם כבר מתקיימות בבית הספר שלך פעילויות שמשלבות פיתוח מיומנויות?",["כן, יש לנו פעילויות","עדיין לא"]);setFlow("q1");},350);
    }
    else if(flow==="q1"){
      if(val==="כן, יש לנו פעילויות"){
        setTimeout(()=>{bot("כיף לשמוע! 🎉\n\nבאיזו זירה בית-ספרית תרצה שנתחיל?",aC(page));setFlow("describe_arena");},350);
      } else {
        setTimeout(()=>{bot("זה בסדר גמור — כולם מתחילים מאי-שם 😊\n\nבאיזו זירה בית-ספרית תרצה שנתחיל?",aC(page));setFlow("arena");},350);
      }
    }
    else if(flow==="describe_arena"){
      setLastArena(val);setShownScenarios([]);
      setTimeout(()=>{bot(`מעולה! בחרת בזירה: ${val} 🏫\n\nתאר/י בקצרה מה קורה כיום בזירה הזו בבית הספר שלך:`,null);setFlow("describe");},350);
    }
    else if(flow==="assess_advance"){
      if(val==="כן, בואו נקדם!"){
        const picks=getHighScenarios(lastArena,[]);
        setShownScenarios(picks.map(k=>k.skill));
        if(picks.length){
          bot(`הנה 3 תרחישים מיטביים לזירה: ${lastArena} 🟢\n\n${buildHighText(picks)}`,["תרחישים נוספים","חקור זירה אחרת","שיחה חופשית"]);
        } else {
          bot("לא נמצאו תרחישים נוספים בזירה זו.",["חקור זירה אחרת","שיחה חופשית"]);
        }
        setFlow("post");
      } else {
        setTimeout(()=>{bot("בסדר גמור 😊\n\nמה תרצה לעשות עכשיו?",["חקור זירות בית-ספריות אחרות","המשך לשיחה חופשית"]);setFlow("after_no");},350);
      }
    }
    else if(flow==="after_no"){
      if(val==="חקור זירות בית-ספריות אחרות"){
        setTimeout(()=>{bot("בחר/י זירה:",aC(page));setFlow("arena");},300);
      } else {
        setTimeout(()=>{bot("בשמחה! 💬\n\nשאל/י אותי כל שאלה בנושא הטמעת מיומנויות בבית הספר — אשמח לעזור.");setFlow("free");},300);
      }
    }
    else if(flow==="arena"){
      setLastArena(val);setShownScenarios([]);
      const picks=getHighScenarios(val,[]);
      setShownScenarios(picks.map(k=>k.skill));
      if(picks.length){
        bot(`הנה 3 תרחישים מיטביים לזירה: ${val} 🟢\n\n${buildHighText(picks)}`,["תרחישים נוספים","חקור זירה אחרת","שיחה חופשית"]);
      } else {
        bot("לא נמצאו תרחישים בזירה זו.",["חקור זירה אחרת","שיחה חופשית"]);
      }
      setFlow("post");
    }
    else if(flow==="post"){
      if(val==="תרחישים נוספים"){
        const picks=getHighScenarios(lastArena,shownScenarios);
        if(picks.length){
          setShownScenarios(p=>[...p,...picks.map(k=>k.skill)]);
          bot(`עוד תרחישים מיטביים — ${lastArena} 🟢\n\n${buildHighText(picks)}`,["תרחישים נוספים","חקור זירה אחרת","שיחה חופשית"]);
        } else {
          bot("כל התרחישים הזמינים בזירה זו הוצגו 😊",["חקור זירה אחרת","שיחה חופשית"]);
        }
      }
      else if(val==="חקור זירה אחרת"){setTimeout(()=>{bot("בחר/י זירה:",aC(page));setFlow("arena");},300);}
      else{setFlow("free");doFree(val);}
    }
    else{doFree(val);}
  }

  async function doFree(text){
    setTyping(true);
    const topic=lastArena||"";
    try{const r=await callAI(`יועץ חינוכי. ${prof.role}|${prof.sector}\n${buildKB(topic)}`,text,hist.slice(-6));setHist(h=>[...h,{role:"user",content:text},{role:"assistant",content:r}]);setTyping(false);bot(r);}
    catch{setTyping(false);bot("שגיאה.");}
  }

  async function send(){
    const t=input.trim();if(!t||typing)return;setInput("");usr(t);
    if(flow==="describe"){
      setTyping(true);
      const kbContext=KB.filter(k=>k.arena===lastArena).map(k=>`🔴${k.low}\n🟡${k.mid}\n🟢${k.high}`).join("\n---\n");
      const prompt=`תפקיד: ${prof.role} | מגזר: ${prof.sector}\nזירה: ${lastArena}\nתיאור הפעילות הקיימת: "${t}"\n\nהקשר מחוון הזירה:\n${kbContext}\n\nכתוב הערכה כללית קצרה (3-4 משפטים בלבד) של רמת ביטוי המיומנויות בזירה זו. אל תפרט לפי מיומנויות בודדות — תן תמונה כוללת ומשוב כן ומעודד. סיים בשורה אחת שמציינת את הרמה הכללית (🔴 / 🟡 / 🟢).`;
      try{
        const r=await callAI("יועץ חינוכי מומחה. ענה בעברית.",prompt);
        setHist(h=>[...h,{role:"user",content:t},{role:"assistant",content:r}]);
        setTyping(false);bot(r);
        setTimeout(()=>{bot("האם תרצה לקדם את הזירה לרמה מיטבית? 🚀",["כן, בואו נקדם!","לא, תודה"]);setFlow("assess_advance");},700);
      }catch{
        setTyping(false);
        setTimeout(()=>{bot("האם תרצה לקדם את הזירה לרמה מיטבית? 🚀",["כן, בואו נקדם!","לא, תודה"]);setFlow("assess_advance");},400);
      }
    }
    else{doFree(t);}
  }

  const showInput=["describe","free","post"].includes(flow);
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f0f9ff",direction:"rtl"}}>
      <div className="chatbot-header" style={{background:"linear-gradient(135deg,#0c4a6e,#0369a1)",padding:"12px 16px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={LOGO_B64} alt="לוגו" style={{width:38,height:38,objectFit:"contain",borderRadius:8,flexShrink:0}}/>
          <div><div style={{fontWeight:900,fontSize:14,color:"white"}}>מיומנובוט 2030</div><div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>כלי סיוע ובקרה בהטמעת מיומנויות דמות הבוגר</div></div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"12px"}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:m.from==="user"?"row-reverse":"row",gap:7,marginBottom:14,alignItems:"flex-end"}}>
            {m.from==="bot"&&<img src={LOGO_B64} alt="בוט" style={{width:30,height:30,objectFit:"contain",borderRadius:6,flexShrink:0}}/>}
            <div style={{maxWidth:"80%",background:m.from==="user"?"linear-gradient(135deg,#0369a1,#0891b2)":"white",color:m.from==="user"?"white":"#1e293b",borderRadius:m.from==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.7,boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
              <div style={{whiteSpace:"pre-wrap"}}>{m.text}</div>
              {m.chips&&<div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:10,direction:"rtl"}}>{m.chips.map((c,j)=><Chip key={j} label={c} onClick={()=>pick(c)}/>)}</div>}
              <div style={{fontSize:9,opacity:0.3,marginTop:4,textAlign:m.from==="user"?"left":"right"}}>{m.ts}</div>
            </div>
          </div>
        ))}
        {typing&&<div style={{display:"flex",gap:7,marginBottom:12,alignItems:"flex-end"}}><img src={LOGO_B64} alt="בוט" style={{width:30,height:30,objectFit:"contain",borderRadius:6,flexShrink:0}}/><div style={{background:"white",borderRadius:"16px 16px 16px 4px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}><Dots/></div></div>}
        <div ref={endRef}/>
      </div>
      {showInput&&<div style={{padding:"10px 12px 14px",background:"white",borderTop:"1px solid #e2e8f0",flexShrink:0}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="כתוב/י כאן..." rows={1} style={{flex:1,border:"2px solid #bae6fd",borderRadius:16,padding:"9px 12px",fontSize:13,resize:"none",outline:"none",direction:"rtl",color:"#334155",fontFamily:"inherit"}}/>
          <button onClick={send} disabled={!input.trim()||typing} style={{width:40,height:40,borderRadius:"50%",border:"none",background:input.trim()&&!typing?"linear-gradient(135deg,#0369a1,#0891b2)":"#e2e8f0",color:"white",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>↑</button>
        </div>
      </div>}
    </div>
  );
}

function InsightPanel({events,onGoBot}) {
  const [open,setOpen]=useState(false);
  const [aiRec,setAiRec]=useState("");
  const [loadingRec,setLoadingRec]=useState(false);
  const lastEv=events[0]||null;
  useEffect(()=>{setAiRec("");},[lastEv?.id]);

  async function loadRecommendations() {
    if(!lastEv)return;setOpen(true);if(aiRec)return;
    setLoadingRec(true);
    const kbRows=KB.filter(k=>k.arena===lastEv.arena);
    const kbContext=kbRows.map(k=>`מיומנות: ${k.skill}\n🟢 מיטבי: ${k.high}`).join("\n\n");
    const prompt=`זירה: "${lastEv.arena}"\nרמה: ${LVL[lastEv.level].t}\nמיומנויות: ${lastEv.skills.join(", ")}\n${kbContext?`\nדוגמאות מיטביות:\n${kbContext}`:""}\n\nכתוב בדיוק 2 המלצות פרקטיות לקידום הזירה לרמה מיטבית. כל המלצה תתחיל בסימן • ותהיה שלמה ומפורטת. חשוב מאוד: אל תכתוב יותר מ-2 המלצות, וודא שכל המלצה מסתיימת במשפט שלם לפני שעוברים לבאה.`;
    try{const r=await callAI("יועץ חינוכי מומחה. ענה בעברית.",prompt);setAiRec(r);}
    catch{setAiRec("• לא ניתן לטעון המלצות כעת.");}
    setLoadingRec(false);
  }

  return (
    <div style={{marginTop:8}}>
      <button onClick={()=>{if(!open)loadRecommendations();else setOpen(false);}} style={{width:"100%",padding:"11px 16px",borderRadius:10,border:"1px solid #bae6fd",background:open?"rgba(3,105,161,0.07)":"white",color:open?"#0369a1":"#64748b",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",fontFamily:"inherit",transition:"all .2s"}}>
        <span>💡 הסבר רמות + המלצות לשיפור {lastEv?`— ${lastEv.arena}`:""}</span>
        <span style={{fontSize:10,transition:"transform .2s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)"}}>▼</span>
      </button>
      {open&&(
        <div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:"0 0 10px 10px",padding:"18px 18px 14px",display:"flex",flexDirection:"column",gap:16}}>
          <div>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",color:"#0369a1",marginBottom:10,textTransform:"uppercase"}}>מה המשמעות של כל רמה?</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {["low","mid","high"].map(lk=>{const lv=LVL[lk];const ex=LEVEL_EXPLANATIONS[lk];const isActive=lastEv?.level===lk;return(
                <div key={lk} style={{padding:"10px 12px",borderRadius:8,background:isActive?lv.bg:"rgba(3,105,161,0.03)",border:`1.5px solid ${isActive?lv.border:"#bae6fd"}`}}>
                  <div style={{fontSize:12,fontWeight:800,color:lv.c,marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                    {ex.title}{isActive&&<span style={{fontSize:9,background:lv.c,color:"white",borderRadius:99,padding:"1px 7px",fontWeight:700}}>הרמה הנוכחית</span>}
                  </div>
                  <div style={{fontSize:11,color:"#475569",lineHeight:1.6}}>{ex.desc}</div>
                </div>
              );})}
            </div>
          </div>
          {lastEv&&(
            <div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.1em",color:"#0369a1",marginBottom:10,textTransform:"uppercase"}}>המלצות לקידום — {lastEv.arena}</div>
              {loadingRec
                ?<div style={{display:"flex",alignItems:"center",gap:8,padding:"12px",background:"white",borderRadius:8,border:"1px solid #bae6fd"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",border:"2px solid #0369a1",borderTopColor:"transparent",animation:"spin .8s linear infinite",flexShrink:0}}/><span style={{fontSize:11,color:"#0369a1"}}>מייצר המלצות מותאמות...</span></div>
                :<div style={{background:"white",borderRadius:8,border:"1px solid #bae6fd",padding:"12px 14px"}}>
                  {aiRec.split("\n").filter(l=>l.trim()).map((line,i,arr)=>(
                    <div key={i} style={{fontSize:12,color:"#334155",lineHeight:1.7,paddingBottom:i<arr.length-1?6:0,borderBottom:i<arr.length-1?"1px solid #e0f2fe":"none",marginBottom:i<arr.length-1?6:0}}>{line}</div>
                  ))}
                </div>}
            </div>
          )}
          <div style={{background:"linear-gradient(135deg,rgba(3,105,161,0.08),rgba(14,165,233,0.05))",border:"1.5px solid #bae6fd",borderRadius:10,padding:"13px 14px",display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{fontSize:22,flexShrink:0}}>🤖</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:800,color:"#0369a1",marginBottom:4}}>רוצה לבנות תוכנית עבודה מלאה?</div>
              <div style={{fontSize:11,color:"#475569",lineHeight:1.6,marginBottom:10}}>בכל שלב תוכל לפנות למסייע ולבנות יחד תוכנית עבודה מותאמת אישית לקידום המיומנויות — לפי הזירות, הרמות והצרכים הספציפיים שלך.</div>
              <button onClick={onGoBot} style={{padding:"7px 16px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#0369a1,#0891b2)",color:"white",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>עבור למסייע ובנה תוכנית ›</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  { label:"📚 לימודית", arenas:["הוראה","למידה","הערכה","שיעורי חינוך","תעודות","שעות פרטניות","המרחב הדיגיטלי"] },
  { label:"💛 רגשית-אישית", arenas:["הפסקות","כישורי חיים"] },
  { label:"🏗️ ארגונית", arenas:["ישיבות פדגוגיות","פיתוח מקצועי","ימי הורים","מערכת השעות","ישיבות צוות","שפה בית ספרית","גאנט בית ספרי","מרחבי למידה פיזיים"] },
  { label:"🌍 חברתית-קהילתית", arenas:["טיולים שנתיים","פעילות חוץ כיתתית","אירועים בית ספריים","חינוך חברתי","שותפויות קהילתיות","מועצת תלמידים"] },
];

function StepBadge({n, done, active}) {
  const bg = done ? "#22c55e" : active ? "#0369a1" : "#cbd5e1";
  return (
    <div style={{width:26,height:26,borderRadius:"50%",background:bg,color:"white",
      fontSize:12,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",
      flexShrink:0,transition:"background .3s",boxShadow:active||done?"0 2px 8px rgba(3,105,161,0.3)":"none"}}>
      {done ? "✓" : n}
    </div>
  );
}

function Dashboard({onGoBot}) {
  const [events,setEvents]=useState([]);
  const [selArenas,setSelArenas]=useState([]);
  const [desc,setDesc]=useState("");
  const [selS,setSelS]=useState([]);
  const [aiLvl,setAiLvl]=useState(null);
  const [aiLbl,setAiLbl]=useState("");
  const [busy,setBusy]=useState(false);
  const [saved,setSaved]=useState(false);
  const [tab,setTab]=useState("insights");
  const [chartArena,setChartArena]=useState("");
  const assessedRef = useRef({level:null, label:""});

  function resetAssessed(){setAiLvl(null);setAiLbl("");assessedRef.current={level:null,label:""};}
  function setDescAndReset(v){setDesc(v);if(assessedRef.current.level)resetAssessed();}
  const tog=s=>{setSelS(p=>{const next=p.includes(s)?p.filter(x=>x!==s):[...p,s];if(assessedRef.current.level)resetAssessed();return next;});};
  const togArena=a=>{setSelArenas(p=>{const next=p.includes(a)?p.filter(x=>x!==a):[...p,a];if(assessedRef.current.level)resetAssessed();return next;});};

  // derived: first selected arena for backward compat
  const arena = selArenas[0] || "";

  async function assess(){
    if(!selArenas.length||!desc.trim()||!selS.length)return;
    setBusy(true);
    setAiLvl(null);setAiLbl("");
    assessedRef.current={level:null,label:""};

    const ctx=selS.map(s=>`${s}: ${SKILL_DEFS[s]||""}`).join(", ");
    const arenasCtx=selArenas.join(", ");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:120,
        system:`ענה תמיד רק בפורמט הזה בדיוק, ללא שום טקסט נוסף:
LEVEL:[low/mid/high]
LABEL:[🔴 נמוכה / 🟡 קיימת אך לא מספיקה / 🟢 מיטבית]
VALID:[yes/no]

אם התיאור מכיל תווים אקראיים, חסר משמעות שפתית, או אינו מתאר פעילות אמיתית — החזר VALID:no.
אחרת החזר VALID:yes עם הרמה המתאימה.`,
        messages:[{role:"user",content:`זירות:${arenasCtx}\nמיומנויות:${ctx}\nתיאור:"${desc}"\nקבע רמה.`}]})});
      const d=await res.json();
      const t=d.content?.[0]?.text||"";
      const validMatch=t.match(/VALID:(yes|no)/i);
      const isValid=!validMatch||validMatch[1].toLowerCase()==="yes";

      if(!isValid){
        assessedRef.current={level:null,label:""};
        setAiLvl("invalid");
        setAiLbl("לא זוהה תיאור תקין");
      } else {
        const lm=t.match(/LEVEL:(low|mid|high)/);
        const lb=t.match(/LABEL:([^\n]+)/);
        const lv=lm?lm[1]:"mid";
        const lbl=lb?lb[1].trim():LVL[lv].e+" "+LVL[lv].t;
        assessedRef.current={level:lv, label:lbl};
        setAiLvl(lv);
        setAiLbl(lbl);
      }
    }
    catch{
      setAiLvl("error");
      setAiLbl("שגיאת תקשורת — נסה שוב");
      assessedRef.current={level:null,label:""};
    }
    setBusy(false);
  }

  function save(){
    const lvl=assessedRef.current.level;
    const lbl=assessedRef.current.label;
    if(!selArenas.length||!desc.trim()||!selS.length||!lvl)return;
    setEvents(p=>[{id:Date.now(),arena:selArenas[0],arenas:[...selArenas],description:desc,skills:[...selS],level:lvl,levelLabel:lbl,date:Date.now()},...p]);
    setSelArenas([]);setDesc("");setSelS([]);setAiLvl(null);setAiLbl("");
    assessedRef.current={level:null,label:""};
    setSaved(true);setTimeout(()=>setSaved(false),900);
  }

  function exportCSV(){
    if(!events.length)return;
    const rows=events.map(e=>[e.arena,`"${e.description.replace(/"/g,'""')}"`,`"${e.skills.join(", ")}"`,LVL[e.level].t,new Date(e.date).toLocaleDateString("he-IL")].join(","));
    const csv="\uFEFF"+"זירה,תיאור,מיומנויות,רמה,תאריך\n"+rows.join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download="events.csv";a.click();
  }

  const skillData=useMemo(()=>SKILLS.map(s=>{const r=events.filter(e=>e.skills.includes(s));return{s,score:r.length?Math.round(r.reduce((a,e)=>a+SCORE[e.level],0)/r.length*33.33):0,n:r.length};}).filter(d=>d.n>0).sort((a,b)=>b.score-a.score),[events]);
  const arenaData=useMemo(()=>ALL_ARENAS.map(a=>{const r=events.filter(e=>e.arena===a);return{a,score:r.length?Math.round(r.reduce((s,e)=>s+SCORE[e.level],0)/r.length*33.33):0,n:r.length};}).filter(d=>d.n>0),[events]);
  const avg=events.length?Math.round(events.reduce((s,e)=>s+SCORE[e.level],0)/events.length*33.33):0;

  // Bar chart: for chosen arena, show level per skill (from KB + override with recorded events)
  const arenaSkillChart=useMemo(()=>{
    return SKILLS.map(skill=>{
      // First try: recorded events for this arena+skill (most recent)
      const recorded=events.filter(e=>e.arena===chartArena&&e.skills.includes(skill));
      if(recorded.length){
        const best=recorded.reduce((a,b)=>SCORE[b.level]>SCORE[a.level]?b:a);
        return {skill, level:best.level, score:SCORE[best.level], source:"recorded"};
      }
      // Fallback: KB baseline
      const kbRow=KB.find(k=>k.arena===chartArena&&k.skill===skill);
      if(kbRow) return {skill, level:null, score:0, source:"kb"};
      return {skill, level:null, score:0, source:"none"};
    }).filter(d=>d.source!=="none"||true); // show all 13 always
  },[chartArena, events]);
  const canAssess = selArenas.length>0 && desc.trim().length>0 && selS.length>0;
  const canSave=canAssess&&["low","mid","high"].includes(assessedRef.current.level);
  const step1done = desc.trim().length>0;
  const step2done = selS.length>0;
  const step3done = selArenas.length>0;

  return (
    <div style={{height:"100%",overflowY:"auto",background:"#f0f9ff",color:"#1e293b",direction:"rtl"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(245,158,11,.5)}70%{box-shadow:0 0 0 10px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}select{appearance:none}`}</style>
      <div className="dash-header" style={{borderBottom:"1px solid #bae6fd",padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",background:"linear-gradient(135deg,#0c4a6e,#0369a1)",position:"sticky",top:0,zIndex:5}}>
        <div><div style={{fontSize:16,fontWeight:900,color:"white"}}>דשבורד מעקב הטמעה</div><div style={{fontSize:10,color:"rgba(255,255,255,0.7)"}}>מיומנויות דמות הבוגר 2030</div></div>
        <img src={LOGO_B64} alt="לוגו" style={{height:40,objectFit:"contain",borderRadius:6}}/>
        <div className="dash-stats" style={{display:"flex",gap:8}}>
          {[{l:"אירועים",v:events.length,c:"white"},{l:"ממוצע",v:`${avg}%`,c:"#7dd3fc"},{l:"מיטביים",v:events.filter(e=>e.level==="high").length,c:"#86efac"}].map(s=>(
            <div key={s.l} className="dash-stat" style={{textAlign:"center",background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:9,padding:"7px 14px"}}>
              <div className="dash-stat-val" style={{fontSize:16,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:"rgba(255,255,255,0.7)",fontWeight:700}}>{s.l}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="dash-grid" style={{display:"grid",gridTemplateColumns:"360px 1fr",gap:16,padding:"16px 20px"}}>

        {/* LEFT: 4-step form */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>

          {/* STEP 1 */}
          <Card>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <StepBadge n={1} done={step1done} active={!step1done}/>
              <div style={{fontSize:13,fontWeight:800,color:"#0c4a6e"}}>פירוט האירוע</div>
              {step1done&&<span style={{fontSize:9,color:"#22c55e",fontWeight:700,marginRight:"auto",marginLeft:0}}>✓ הושלם</span>}
            </div>
            <textarea value={desc} onChange={e=>setDescAndReset(e.target.value)}
              placeholder="תאר/י את הפעילות — מה קרה? מי מעורב? כמה פעמים? מה התוצאות?"
              rows={4}
              style={{width:"100%",background:"#f8fbff",border:desc?"1.5px solid #0369a1":"1.5px solid #bae6fd",borderRadius:8,padding:"9px 10px",color:"#1e293b",fontSize:12,resize:"vertical",outline:"none",lineHeight:1.6,fontFamily:"inherit"}}/>
          </Card>

          {/* STEP 2 */}
          <Card style={{opacity:step1done?1:0.45,pointerEvents:step1done?"auto":"none",transition:"opacity .3s"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <StepBadge n={2} done={step2done} active={step1done&&!step2done}/>
              <div style={{fontSize:13,fontWeight:800,color:"#0c4a6e"}}>מיומנויות</div>
              {selS.length>0&&<span style={{background:"#0369a1",color:"white",borderRadius:99,padding:"1px 8px",fontSize:9,fontWeight:800,marginRight:"auto",marginLeft:0}}>{selS.length} נבחרו</span>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {SKILLS.map(s=>(
                <button key={s} onClick={()=>tog(s)} className="chip-btn" style={{padding:"4px 10px",borderRadius:99,cursor:"pointer",fontSize:11,
                  fontWeight:selS.includes(s)?700:400,
                  border:selS.includes(s)?"1.5px solid #0369a1":"1.5px solid #bae6fd",
                  background:selS.includes(s)?"rgba(3,105,161,0.12)":"transparent",
                  color:selS.includes(s)?"#0369a1":"#64748b",
                  transition:"all .15s",fontFamily:"inherit"}}>{s}</button>
              ))}
            </div>
          </Card>

          {/* STEP 3 */}
          <Card style={{opacity:step2done?1:0.45,pointerEvents:step2done?"auto":"none",transition:"opacity .3s"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
              <StepBadge n={3} done={step3done} active={step2done&&!step3done}/>
              <div style={{fontSize:13,fontWeight:800,color:"#0c4a6e"}}>זירות בית-ספריות</div>
              {selArenas.length>0&&<span style={{background:"#0369a1",color:"white",borderRadius:99,padding:"1px 8px",fontSize:9,fontWeight:800,marginRight:"auto",marginLeft:0}}>{selArenas.length} נבחרו</span>}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {ARENA_GROUPS.map(grp=>(
                <div key={grp.label}>
                  <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:5,letterSpacing:"0.04em"}}>{grp.label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {grp.arenas.map(a=>(
                      <button key={a} onClick={()=>togArena(a)} className="chip-btn" style={{padding:"4px 10px",borderRadius:99,cursor:"pointer",fontSize:11,
                        fontWeight:selArenas.includes(a)?700:400,
                        border:selArenas.includes(a)?"1.5px solid #0369a1":"1.5px solid #bae6fd",
                        background:selArenas.includes(a)?"rgba(3,105,161,0.12)":"transparent",
                        color:selArenas.includes(a)?"#0369a1":"#64748b",
                        transition:"all .15s",fontFamily:"inherit"}}>{a}</button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </Card>

          {/* STEP 4 */}
          <Card style={{opacity:canAssess?1:0.45,pointerEvents:canAssess?"auto":"none",transition:"opacity .3s"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <StepBadge n={4} done={["low","mid","high"].includes(assessedRef.current.level)} active={canAssess&&!["low","mid","high"].includes(assessedRef.current.level)}/>
              <div style={{fontSize:13,fontWeight:800,color:"#0c4a6e"}}>הערכת רמה — AI</div>
            </div>
            {busy
              ? <div style={{display:"flex",alignItems:"center",gap:8,padding:9,background:"#f0f9ff",borderRadius:8,border:"1px solid #bae6fd"}}><div style={{width:12,height:12,borderRadius:"50%",border:"2px solid #0369a1",borderTopColor:"transparent",animation:"spin .8s linear infinite"}}/><span style={{fontSize:11,color:"#64748b"}}>מעריך...</span></div>
              : aiLvl==="invalid"
              ? <div style={{padding:10,background:"rgba(239,68,68,0.06)",borderRadius:8,border:"1.5px solid rgba(239,68,68,0.25)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#ef4444",marginBottom:4}}>⚠️ לא זוהה תיאור תקין</div>
                  <div style={{fontSize:11,color:"#64748b",lineHeight:1.6}}>הטקסט שהוזן אינו מכיל תיאור פעילות ברור.</div>
                </div>
              : aiLvl==="error"
              ? <div style={{padding:10,background:"rgba(245,158,11,0.06)",borderRadius:8,border:"1.5px solid rgba(245,158,11,0.25)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#f59e0b",marginBottom:4}}>⚠️ שגיאת תקשורת</div>
                  <div style={{fontSize:11,color:"#64748b"}}>לא ניתן היה להתחבר לשרת. נסה/י שוב.</div>
                </div>
              : LVL[aiLvl]
              ? <div style={{padding:9,background:LVL[aiLvl].bg,borderRadius:8,border:`1.5px solid ${LVL[aiLvl].border}`}}>
                  <div style={{fontSize:13,fontWeight:800,color:LVL[aiLvl].c}}>{aiLbl}</div>
                  <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{LEVEL_EXPLANATIONS[aiLvl]?.desc?.substring(0,80)}...</div>
                </div>
              : <div style={{padding:9,background:"#f0f9ff",borderRadius:8,border:"1px solid #bae6fd"}}>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{canAssess?"לחץ/י על 'הערך' לקבלת הערכת רמה":"השלם/י שלבים 1-3 לפתיחת ההערכה"}</div>
                </div>
            }
            {!busy&&canAssess&&(
              <button onClick={assess} style={{marginTop:8,width:"100%",padding:"8px",borderRadius:8,border:"none",
                background:"linear-gradient(135deg,#0369a1,#0891b2)",color:"white",fontSize:12,fontWeight:700,
                cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(3,105,161,0.3)"}}>
                ✶ הערך רמה
              </button>
            )}
          </Card>

          {(aiLvl==="invalid"||aiLvl==="error")&&
            <div style={{padding:"8px 12px",background:"rgba(239,68,68,0.06)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,fontSize:11,color:"#ef4444",textAlign:"center"}}>
              יש לתקן את התיאור ולהעריך מחדש לפני השמירה
            </div>
          }
          <button onClick={save} disabled={!canSave} style={{padding:12,borderRadius:10,border:"none",background:canSave?"linear-gradient(135deg,#0c4a6e,#0369a1)":"#e0f2fe",color:canSave?"white":"#94a3b8",fontSize:14,fontWeight:800,cursor:canSave?"pointer":"default",fontFamily:"inherit",animation:saved?"pulse .8s ease-out":"none"}}>{saved?"✓ נשמר!":"שמור אירוע"}</button>
          <button onClick={onGoBot} style={{padding:10,borderRadius:10,border:"1.5px solid #bae6fd",background:"white",color:"#0369a1",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🤖 עבור למיומנובוט</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",background:"white",border:"1px solid #bae6fd",borderRadius:10,padding:4,gap:3}}>
            {[{id:"insights",l:"💡 הסבר והמלצות"},{id:"charts",l:"📊 גרפים"},{id:"table",l:"📋 אירועים"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{flex:1,padding:"8px 0",borderRadius:7,border:"none",cursor:"pointer",background:tab===t.id?"rgba(3,105,161,0.12)":"transparent",color:tab===t.id?"#0369a1":"#94a3b8",fontSize:12,fontWeight:700,transition:"all .15s",fontFamily:"inherit"}}>{t.l}</button>
            ))}
          </div>
          {tab==="table"&&<Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Lbl>רשימת אירועים ({events.length})</Lbl>
              <button onClick={exportCSV} style={{padding:"6px 12px",borderRadius:7,border:"1px solid #bae6fd",background:"white",color:"#0369a1",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⬇ ייצוא לאקסל</button>
            </div>
            {events.length===0
              ?<div style={{textAlign:"center",padding:"32px 0",color:"#334155",fontSize:12}}>אין אירועים עדיין</div>
              :<div className="mobile-table-wrap" style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,direction:"rtl"}}>
                  <thead><tr>{["זירה","תיאור","מיומנויות","רמה","תאריך",""].map((h,i)=><th key={i} style={{padding:"7px 9px",borderBottom:"1px solid #bae6fd",color:"#0369a1",fontWeight:700,fontSize:9,textAlign:"right",whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
                  <tbody>{events.map(ev=>{const lv=LVL[ev.level];return(
                    <tr key={ev.id} style={{borderBottom:"1px solid #e0f2fe"}}>
                      <td style={{padding:"8px 9px",color:"#0369a1",fontWeight:700,whiteSpace:"nowrap"}}>{ev.arena}</td>
                      <td style={{padding:"8px 9px",color:"#475569",maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.description}</td>
                      <td style={{padding:"8px 9px",color:"#475569",fontSize:10}}>{ev.skills.join(", ")}</td>
                      <td style={{padding:"8px 9px",whiteSpace:"nowrap"}}><span style={{background:lv.bg,color:lv.c,border:`1px solid ${lv.border}`,borderRadius:99,padding:"3px 10px",fontWeight:800,fontSize:10}}>{lv.e} {lv.t}</span></td>
                      <td style={{padding:"8px 9px",color:"#64748b",whiteSpace:"nowrap"}}>{new Date(ev.date).toLocaleDateString("he-IL")}</td>
                      <td style={{padding:"8px 9px"}}><button onClick={()=>setEvents(p=>p.filter(x=>x.id!==ev.id))} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:10,padding:"3px 8px",cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>🗑</button></td>
                    </tr>
                  );})}</tbody>
                </table>
              </div>
            }
          </Card>}
          {tab==="insights"&&<InsightPanel events={events} onGoBot={onGoBot}/>}
          {tab==="charts"&&<>
            <div className="charts-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <Card><Lbl>פריסת מיומנויות</Lbl>
                {skillData.length===0?<div style={{color:"#94a3b8",fontSize:11,textAlign:"center",padding:"16px 0"}}>אין נתונים עדיין</div>:
                <div style={{display:"flex",flexDirection:"column",gap:7}}>{skillData.map(d=>(
                  <div key={d.s} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:90,fontSize:10,color:"#0369a1",textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.s}</div>
                    <div style={{flex:1,background:"#e0f2fe",borderRadius:99,height:6}}><div style={{width:`${d.score}%`,height:"100%",borderRadius:99,background:d.score>=66?"#22c55e":d.score>=33?"#f59e0b":"#ef4444",transition:"width .5s"}}/></div>
                    <div style={{width:26,fontSize:9,color:"#64748b"}}>{d.score}%</div>
                  </div>
                ))}</div>}
              </Card>
              <Card><Lbl>פעילות לפי זירות</Lbl>
                {arenaData.length===0?<div style={{color:"#94a3b8",fontSize:11,textAlign:"center",padding:"16px 0"}}>אין נתונים עדיין</div>:
                <div style={{display:"flex",flexDirection:"column",gap:7}}>{arenaData.map(d=>(
                  <div key={d.a} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:85,fontSize:10,color:"#0369a1",textAlign:"right",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.a}</div>
                    <div style={{flex:1,background:"#e0f2fe",borderRadius:99,height:6}}><div style={{width:`${d.score}%`,height:"100%",borderRadius:99,background:d.score>=66?"#22c55e":d.score>=33?"#f59e0b":"#ef4444",transition:"width .5s"}}/></div>
                    <div style={{width:26,fontSize:9,color:"#64748b"}}>{d.n}×</div>
                  </div>
                ))}</div>}
              </Card>
            </div>
            <Card><Lbl>אירועים אחרונים</Lbl>
              {events.length===0?<div style={{color:"#94a3b8",fontSize:11,textAlign:"center",padding:"12px 0"}}>אין אירועים עדיין</div>:
              <div style={{display:"flex",flexDirection:"column",gap:8}}>{events.slice(0,5).map(ev=>{const lv=LVL[ev.level];return(
                <div key={ev.id} style={{display:"flex",gap:9,padding:"9px 11px",background:"white",border:`1px solid ${lv.border}`,borderRadius:8}}>

                    <option value="">— בחר זירה לגרף —</option>
                    {ALL_ARENAS.map(a=><option key={a} value={a}>{a}</option>)}
                  </select>
                  <span style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"#94a3b8",pointerEvents:"none"}}>▼</span>
                </div>
              </div>

              {!chartArena
                ? <div style={{textAlign:"center",padding:"32px 0",color:"#94a3b8",fontSize:12}}>
                    <div style={{fontSize:28,marginBottom:8}}>📊</div>
                    בחר/י זירה כדי לראות את פריסת המיומנויות שלה
                  </div>
                : (()=>{
                    const BAR_W=34, BAR_GAP=8, PAD_L=44, PAD_B=72, PAD_T=16, H=180;
                    const totalW=SKILLS.length*(BAR_W+BAR_GAP)+PAD_L+16;
                    const barColor=score=>score===3?"#22c55e":score===2?"#f59e0b":score===1?"#ef4444":"#e0f2fe";
                    const barLabel=score=>score===3?"מיטבית":score===2?"קיימת":score===1?"נמוכה":"אין נתון";
                    const yLabels=[{v:1,t:"נמוכה"},{v:2,t:"קיימת"},{v:3,t:"מיטבית"}];
                    return (
                      <div className="chart-scroll" style={{overflowX:"auto",direction:"ltr"}}>
                        <svg width={totalW} height={H+PAD_B+PAD_T} style={{display:"block"}}>
                          {/* Y gridlines + labels */}
                          {yLabels.map(({v,t})=>{
                            const y=PAD_T+H-((v/3)*H);
                            return <g key={v}>
                              <line x1={PAD_L} x2={totalW-8} y1={y} y2={y} stroke="#e0f2fe" strokeWidth={1} strokeDasharray="3,3"/>
                              <text x={PAD_L-6} y={y+4} textAnchor="end" fontSize={9} fill="#94a3b8">{t}</text>
                            </g>;
                          })}
                          {/* X axis */}
                          <line x1={PAD_L} x2={totalW-8} y1={PAD_T+H} y2={PAD_T+H} stroke="#bae6fd" strokeWidth={1.5}/>
                          {/* Bars + skill labels */}
                          {arenaSkillChart.map((d,i)=>{
                            const x=PAD_L+i*(BAR_W+BAR_GAP);
                            const barH=d.score?(d.score/3)*H:6;
                            const y=PAD_T+H-barH;
                            const col=barColor(d.score);
                            // Skill name — split to 2 lines max
                            const words=d.skill.split(" ");
                            const line1=words.slice(0,Math.ceil(words.length/2)).join(" ");
                            const line2=words.slice(Math.ceil(words.length/2)).join(" ");
                            return <g key={d.skill}>
                              {/* Bar */}
                              <rect x={x} y={y} width={BAR_W} height={barH} rx={4} fill={col} opacity={d.score?1:0.25}/>
                              {/* Value label on top */}
                              {d.score>0&&<text x={x+BAR_W/2} y={y-5} textAnchor="middle" fontSize={9} fontWeight="700" fill={col}>{barLabel(d.score)}</text>}
                              {/* Skill name below X axis */}
                              <text x={x+BAR_W/2} y={PAD_T+H+13} textAnchor="middle" fontSize={9} fill="#0369a1">{line1}</text>
                              {line2&&<text x={x+BAR_W/2} y={PAD_T+H+24} textAnchor="middle" fontSize={9} fill="#0369a1">{line2}</text>}
                            </g>;
                          })}
                        </svg>
                        {/* Legend */}
                        <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:8,flexWrap:"wrap",direction:"rtl"}}>
                          {[{c:"#22c55e",t:"🟢 מיטבית"},{c:"#f59e0b",t:"🟡 קיימת"},{c:"#ef4444",t:"🔴 נמוכה"},{c:"#e0f2fe",t:"⬜ אין נתון"}].map(({c,t})=>(
                            <div key={t} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"#475569"}}>
                              <div style={{width:10,height:10,borderRadius:3,background:c,flexShrink:0}}/>
                              {t}
                            </div>
                          ))}
                        </div>
                        <div style={{fontSize:10,color:"#94a3b8",textAlign:"center",marginTop:8,direction:"rtl"}}>
                          {events.filter(e=>e.arena===chartArena).length>0
                            ? `מוצגים נתונים מ-${events.filter(e=>e.arena===chartArena).length} אירועים מוקלטים בזירה זו`
                            : "אין אירועים מוקלטים לזירה זו — הגרף יתעדכן לאחר הוספת אירועים"}
                        </div>
                      </div>
                    );
                  })()
              }
            </Card>
          </>}
        </div>
      </div>
    </div>
  );
}

function getEmbedUrl(url) {
  const driveMatch = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(driveMatch) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;
  if(/docs\.google\.com\/(presentation|document|spreadsheets)/.test(url))
    return url.replace(/\/(edit|view).*$/,"/preview");
  if(/youtu\.be\/([^?]+)/.test(url))
    return `https://www.youtube.com/embed/${url.match(/youtu\.be\/([^?]+)/)[1]}`;
  if(/youtube\.com\/watch\?v=([^&]+)/.test(url))
    return `https://www.youtube.com/embed/${url.match(/v=([^&]+)/)[1]}`;
  return url;
}

function ResourceCenter() {
  const [resources, setResourcesState] = useState(INIT_RESOURCES);
  const [loaded, setLoaded] = useState(false);
  const [cat, setCat] = useState("הכל");
  const [search, setSearch] = useState("");
  const [isAdmin, setIsAdmin] = useState(false);
  const [modal, setModal] = useState(null);

  // Load from shared storage on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("resources_v1");
      if (saved) setResourcesState(JSON.parse(saved));
    } catch(e) {}
    setLoaded(true);
  }, []);

  // Save to shared storage whenever resources change (after initial load)
  const [toast, setToast] = useState("");
  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(""), 2200); }

  function persistAndSet(newResources) {
    setResourcesState(newResources);
    try {
      localStorage.setItem("resources_v1", JSON.stringify(newResources));
      showToast("✅ נשמר בהצלחה");
    } catch(e) {
      showToast("⚠️ שגיאה בשמירה");
      console.error("Storage save failed", e);
    }
  }

  const filtered = resources
    .filter(r => (cat==="הכל" || r.cat===cat) && (!search || r.title.includes(search) || r.desc.includes(search)))
    .sort((a,b) => (b.pinned - a.pinned) || (b.date - a.date));

  function saveResource(form, editId=null) {
    const next = editId
      ? resources.map(r => r.id===editId ? {...r,...form} : r)
      : [{id:Date.now(),...form,date:Date.now(),pinned:false},...resources];
    persistAndSet(next);
    setModal(null);
  }

  function togglePin(id) {
    persistAndSet(resources.map(r => r.id===id ? {...r,pinned:!r.pinned} : r));
  }

  function deleteResource(id) {
    persistAndSet(resources.filter(r => r.id!==id));
    setModal(null);
  }

  if (!loaded) return (
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#f0f9ff",flexDirection:"column",gap:12}}>
      <div style={{width:28,height:28,borderRadius:"50%",border:"3px solid #bae6fd",borderTopColor:"#0369a1",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:13,color:"#64748b"}}>טוען משאבים...</div>
    </div>
  );

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#f0f9ff",direction:"rtl"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#0c4a6e",color:"white",padding:"10px 22px",borderRadius:99,fontSize:13,fontWeight:700,zIndex:99999,boxShadow:"0 4px 20px rgba(0,0,0,0.25)",whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0c4a6e,#0369a1)",padding:"13px 20px",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <img src={LOGO_B64} alt="לוגו" style={{width:38,height:38,objectFit:"contain",borderRadius:8,flexShrink:0}}/>
            <div>
              <div style={{fontWeight:900,fontSize:15,color:"white"}}>מרכז משאבים</div>

            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {isAdmin ? (
              <>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",background:"rgba(255,255,255,0.12)",borderRadius:20,padding:"4px 10px"}}>🔓 מצב אדמין</div>
                <button onClick={() => setModal("add")} style={{padding:"8px 16px",borderRadius:9,border:"none",background:"rgba(255,255,255,0.18)",color:"white",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ הוסף משאב</button>
                <button onClick={() => setIsAdmin(false)} style={{padding:"8px 12px",borderRadius:9,border:"1px solid rgba(255,255,255,0.25)",background:"transparent",color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>יציאה</button>
              </>
            ) : (
              <button onClick={() => setModal("login")} style={{padding:"8px 14px",borderRadius:9,border:"1px solid rgba(255,255,255,0.25)",background:"transparent",color:"rgba(255,255,255,0.7)",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🔒 כניסת אדמין</button>
            )}
          </div>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{background:"white",borderBottom:"1px solid #bae6fd",padding:"10px 20px",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <div style={{position:"relative",flexShrink:0}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש..." style={{background:"#f0f9ff",border:"1.5px solid #bae6fd",borderRadius:20,padding:"6px 12px 6px 30px",fontSize:12,color:"#334155",outline:"none",fontFamily:"inherit",width:160}}/>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94a3b8",fontSize:12,pointerEvents:"none"}}>🔍</span>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {RESOURCE_CATS.map(c => (
            <button key={c} onClick={()=>setCat(c)} style={{padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",border:"none",background:cat===c?"#0369a1":"#e0f2fe",color:cat===c?"white":"#0369a1",fontFamily:"inherit"}}>
              {c}
            </button>
          ))}
        </div>
        <div style={{marginRight:"auto",fontSize:11,color:"#94a3b8"}}>{filtered.length} משאבים</div>
      </div>

      {/* Grid */}
      <div style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>
        {filtered.length===0 ? (
          <div style={{textAlign:"center",padding:"60px 0",color:"#94a3b8"}}>
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>{search?"לא נמצאו תוצאות":"אין משאבים עדיין"}</div>
            <div style={{fontSize:12}}>{search?"נסה/י מילת חיפוש אחרת":"לחץ/י על 'הוסף משאב' כדי להתחיל"}</div>
          </div>
        ) : (
          <div className="resource-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
            {filtered.map(r => {
              const tp = RESOURCE_TYPES[r.type] || RESOURCE_TYPES.link;
              return (
                <div key={r.id} style={{background:"white",border:`1.5px solid ${r.pinned?"#0369a1":"#bae6fd"}`,borderRadius:12,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10,boxShadow:r.pinned?"0 2px 12px rgba(3,105,161,0.12)":"0 1px 4px rgba(14,165,233,0.06)",position:"relative"}}>
                  {r.pinned && <div style={{position:"absolute",top:10,left:12,fontSize:12}}>📌</div>}
                  <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                    <div style={{width:40,height:40,borderRadius:10,background:tp.bg,border:`1.5px solid ${tp.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{tp.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:800,color:"#0c4a6e",lineHeight:1.35,marginBottom:4}}>{r.title}</div>
                      <div style={{display:"flex",gap:5}}>
                        <span style={{fontSize:9,fontWeight:700,background:tp.bg,color:tp.color,border:`1px solid ${tp.border}`,borderRadius:99,padding:"1px 7px"}}>{tp.label}</span>
                        <span style={{fontSize:9,color:"#94a3b8",background:"#f0f9ff",border:"1px solid #e0f2fe",borderRadius:99,padding:"1px 7px"}}>{r.cat}</span>
                      </div>
                    </div>
                  </div>
                  {r.desc && <div style={{fontSize:11,color:"#475569",lineHeight:1.6,borderTop:"1px solid #e0f2fe",paddingTop:8}}>{r.desc}</div>}
                  <div style={{display:"flex",gap:6,marginTop:"auto"}}>
                    {r.url ? (
                      <button onClick={() => setModal({type:"preview",r})} style={{flex:1,padding:"7px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#0c4a6e,#0369a1)",color:"white",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>👁 צפה</button>
                    ) : (
                      <div style={{flex:1,padding:"7px",borderRadius:8,background:"#f0f9ff",border:"1px dashed #bae6fd",color:"#94a3b8",fontSize:11,textAlign:"center"}}>אין קישור</div>
                    )}
                    {r.url && <a href={r.url} target="_blank" rel="noopener noreferrer" style={{width:30,height:30,borderRadius:8,border:"1px solid #bae6fd",background:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,textDecoration:"none"}} title="פתח בחלון חדש">↗</a>}
                    {isAdmin && <>
                      <button onClick={() => togglePin(r.id)} title={r.pinned?"הסר הצמדה":"הצמד"} style={{width:30,height:30,borderRadius:8,border:"1px solid #bae6fd",background:r.pinned?"rgba(3,105,161,0.08)":"white",cursor:"pointer",fontSize:13}}>📌</button>
                      <button onClick={() => setModal({type:"edit",r})} style={{width:30,height:30,borderRadius:8,border:"1px solid #bae6fd",background:"white",cursor:"pointer",fontSize:13}}>✏️</button>
                      <button onClick={() => setModal({type:"delete",id:r.id})} style={{width:30,height:30,borderRadius:8,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.04)",cursor:"pointer",fontSize:13}}>🗑</button>
                    </>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Modals */}
      {modal==="login" && <AdminLoginModal onLogin={()=>{setIsAdmin(true);setModal(null);}} onClose={()=>setModal(null)}/>}
      {modal==="add"   && <AddResourceModal onSave={form=>saveResource(form)} onClose={()=>setModal(null)}/>}
      {modal?.type==="edit"    && <AddResourceModal editData={modal.r} onSave={form=>saveResource(form,modal.r.id)} onClose={()=>setModal(null)}/>}
      {modal?.type==="preview" && <PreviewModal resource={modal.r} onClose={()=>setModal(null)}/>}
      {modal?.type==="delete"  && <DeleteConfirmModal onConfirm={()=>deleteResource(modal.id)} onClose={()=>setModal(null)}/>}
    </div>
  );
}

function App() {

  function navigate(dest) {
    setView(dest);
  }

  return (
    <div className="app-wrapper" style={{display:"flex",height:"100vh",background:"#0c4a6e",direction:"rtl",overflow:"hidden",fontFamily:"system-ui,sans-serif",position:"relative"}}>

*{box-sizing:border-box;margin:0;padding:0}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#bae6fd;border-radius:99px}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

      {/* Welcome screen overlays everything */}

          {[{id:"chat",icon:"🤖",label:"מיומנובוט"},{id:"dash",icon:"📊",label:"דשבורד"},{id:"resources",icon:"📚",label:"משאבים"}].map(item=>(

        <div className="app-bottom-nav">

            style={{height:30,objectFit:"contain",cursor:"pointer",opacity:.85}}/>
          {[{id:"chat",icon:"🤖",label:"מיומנובוט"},{id:"dash",icon:"📊",label:"דשבורד"},{id:"resources",icon:"📚",label:"משאבים"}].map(item=>(
            <button key={item.id} onClick={()=>navigate(item.id)}

              <span className="bi">{item.icon}</span>
              <span className="bl">{item.label}</span>
            </button>
          ))}
        </div>
      )}

      {/* Main content */}
      {view!=="welcome" && (
        <div className="app-main" style={{flex:1,overflow:"hidden"}}>
          {view==="chat"&&<Chatbot/>}
          {view==="dash"&&<Dashboard onGoBot={()=>setView("chat")}/>}
          {view==="resources"&&<ResourceCenter/>}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

  </script>
</body>
</html>
